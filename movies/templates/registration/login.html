{% extends 'movies/base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Вход на сайт</h2>

        {% if form.errors %}
        <div class="alert alert-danger">
            Ваше имя пользователя и пароль не совпали. Пожалуйста, попробуйте еще раз.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label">Email:</label>
                <input type="email" name="username" class="form-control" id="id_username" required
                       placeholder="example@mail.com">
            </div>
            <div class="mb-3">
                <label for="id_password" class="form-label">Пароль:</label>
                <input type="password" name="password" class="form-control" id="id_password" required>
            </div>
            <button type="submit" class="btn btn-primary">Войти</button>
        </form>
        <p class="mt-3">У вас еще нет аккаунта? <a href="{% url 'register' %}">Зарегистрируйтесь!</a></p>
    </div>
</div>
{% endblock %}
