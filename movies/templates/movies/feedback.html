{% extends 'movies/base.html' %}
{% block title %}Обратная связь{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card bg-dark text-white border-warning shadow-lg p-4">
            <h2 class="text-center mb-4">📩 Написать нам</h2>

            <div id="ajax-alert" class="alert d-none mb-3"></div>

            <form id="feedback-form" novalidate>
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Ваше имя</label>
                    <input type="text" id="fb-name" name="name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="fb-email" name="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Сообщение</label>
                    <textarea id="fb-message" name="message" class="form-control" rows="3" required></textarea>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="button" id="send-btn" class="btn btn-warning fw-bold">
                        Отправить сообщение
                    </button>
                </div>
            </form>
        </div>

        <p class="text-center mt-3 text-muted">
            <small>Мы получим ваше сообщение в Telegram мгновенно.</small>
        </p>
    </div>
</div>

<script>
document.getElementById('send-btn').addEventListener('click', function() {
    const btn = this;
    const alertDiv = document.getElementById('ajax-alert');
    const form = document.getElementById('feedback-form');

    // Собираем данные в JSON
    const payload = {
        name: document.getElementById('fb-name').value,
        email: document.getElementById('fb-email').value,
        message: document.getElementById('fb-message').value
    };

    // Валидация
    if (!payload.name || !payload.message) {
        alert("Пожалуйста, заполните обязательные поля.");
        return;
    }

    btn.disabled = true;
    btn.textContent = "Отправка...";

    // AJAX-запрос (Лабораторная №6)
    fetch("{% url 'feedback' %}", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        },
        body: JSON.stringify(payload)
    })
    .then(response => response.json())
    .then(data => {
        alertDiv.classList.remove('d-none', 'alert-danger', 'alert-success');
        
        if (data.status === 'success') {
            form.classList.add('d-none'); // Прячем форму после успеха
            alertDiv.classList.add('alert-success');
            alertDiv.textContent = data.message;
        } else {
            btn.disabled = false;
            btn.textContent = "Отправить сообщение";
            alertDiv.classList.add('alert-danger');
            alertDiv.textContent = "Ошибка: " + data.message;
        }
    })
    .catch(err => {
        btn.disabled = false;
        btn.textContent = "Отправить сообщение";
        console.error("Ошибка запроса:", err);
    });
});
</script>

<style>
    .card input, .card textarea {
        background-color: #2b2f32 !important;
        border: 1px solid #495057 !important;
        color: white !important;
    }
    .card input:focus, .card textarea:focus {
        border-color: #ffc107 !important;
        box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.25) !important;
    }
</style>
{% endblock %}
